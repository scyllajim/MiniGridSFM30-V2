name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install CPU PyTorch
        run: |
          pip install torch torchvision torchaudio \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install project and dependencies
        run: |
          pip install -e ".[dev]"

      - name: Import check
        run: |
          python -c "import torch; import torch_geometric; import pandapower"
          python -c "import minigridsfm30; from minigridsfm30.model import GridSFM30"
          python -c "from minigridsfm30.model import GridSFM30, count_parameters; print(count_parameters(GridSFM30()))"

      - name: Run tests
        run: |
          pytest -vv --tb=long
